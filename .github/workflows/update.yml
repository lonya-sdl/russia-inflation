name: Update Inflation Data

on:
  schedule:
    # 1-е число в 06:00 UTC
    - cron: "0 6 1 * *"
    # 16-е число в 06:00 UTC
    - cron: "0 6 16 * *"
    # 20-е число в 06:00 UTC
    - cron: "0 6 20 * *"
  # Кнопка ручного запуска — на вкладке Actions
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update inflation data $(date +'%Y-%m-%d')"
          git push
